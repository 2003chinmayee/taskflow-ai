spring:
  application:
    name: taskflow-backend

  devtools:
    restart:
      enabled: false

  datasource:


    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        generate_statistics: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false



  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 110MB

  cache:
    type: simple

  thymeleaf:
    prefix: classpath:/templates/email/
    suffix: .html
    cache: false

server:
  port: ${PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

app:
  jwt:
    secret: ${JWT_SECRET}
    expiry-minutes: 1440
    refresh-expiry-days: 7
  frontend-url: ${FRONTEND_URL}
  file:
    upload-dir: ./uploads
    max-attachment-size-mb: 10
    allowed-extensions: pdf,doc,docx,png,jpg,jpeg,txt,xlsx
  gemini:
    api-key: ${GEMINI_API_KEY}
    model: gemini-3.5-flash
    fallback-model: gemini-2.5-flash
    api-url: https://generativelanguage.googleapis.com/v1beta/models
    timeout-ms: 15000
  mail:
    from: noreply@taskflowai.com

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.taskflow: DEBUG
    org.springframework.security: DEBUG

resend:
  api:
    key: ${RESEND_API_KEY}
  from:
    email: onboarding@resend.dev

